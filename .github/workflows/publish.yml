# Publishes this n8n community node package to npm with provenance.
#
# Starting May 1 2026, n8n requires community nodes to be published via GitHub
# Actions with npm provenance statements. Provenance lets anyone verify that a
# package was built by this exact workflow, from this exact repo and commit.
#
# ─── HOW A RELEASE WORKS ───────────────────────────────────────────────────────
#
# 1. Bump the version locally and push a tag, e.g.:
#      npm version patch && git push --follow-tags
# 2. Create a GitHub Release for that tag (UI or `gh release create`).
# 3. Publishing this Release triggers this workflow, which builds, tests, and
#    runs `npm publish --provenance`.
#
# You can also run it manually from the Actions tab (workflow_dispatch).
#
# ─── ONE-TIME NPM AUTH SETUP ───────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secret):
#   On npmjs.com → package settings → Publishing access → Trusted Publishers,
#   add this GitHub repo + workflow (publish.yml). Leave NPM_TOKEN unset.
#
# Option B — Automation token (fallback):
#   Create a granular npm token with publish rights for this package and add it
#   as the NPM_TOKEN repository secret.

name: Publish

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # required for npm provenance

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        # Non-blocking: n8n's eslint-plugin-community-nodes valid-peer-dependencies
        # rule rejects the scoped "@n8n/ai-node-sdk" peer dependency and demands the
        # unscoped "ai-node-sdk" — but that package does not exist on npm (404), so
        # the unscoped name makes the package uninstallable. We follow the official
        # @n8n/ai-node-sdk docs and the only verified AI-model community node
        # (n8n-nodes-zai), both of which use the scoped name and likewise fail this
        # outdated rule. Build + tests remain hard gates below.
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
